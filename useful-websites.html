            function renderWebsites(websitesToRender) {
                const container = document.getElementById('websites-container');
                container.innerHTML = '';
                
                websitesToRender.forEach(website => {
                    const card = document.createElement('div');
                    card.className = 'website-card';
                    card.setAttribute('data-id', website.id);
                    card.setAttribute('data-name', website.name);
                    card.setAttribute('data-category', website.category);
                    
                    card.innerHTML = `
                        <div class="website-header">
                            <h3 class="website-name">${website.name}</h3>
                            <button class="favorite-btn" data-id="${website.id}">☆</button>
                        </div>
                        <p class="website-desc">${website.desc}</p>
                        <a href="${website.url}" target="_blank" class="website-link">${website.url}</a>
                    `;
                    
                    container.appendChild(card);
                });
                
                loadFavorites();
            }
            
            function filterWebsites(searchTerm, showFavoritesOnly) {
                const favorites = getFavorites();
                const filteredWebsites = websites.filter(website => {
                    const matchesSearch = website.name.toLowerCase().includes(searchTerm) || 
                                         website.desc.toLowerCase().includes(searchTerm) ||
                                         website.category.toLowerCase().includes(searchTerm) ||
                                         website.url.toLowerCase().includes(searchTerm);
                    const matchesFavorite = !showFavoritesOnly || favorites.includes(String(website.id));
                    return matchesSearch && matchesFavorite;
                });
                
                renderWebsites(filteredWebsites);
                
                const noResults = document.getElementById('no-results');
                if (filteredWebsites.length === 0) {
                    noResults.style.display = 'flex';
                } else {
                    noResults.style.display = 'none';
                }
            }
            
            function showWelcomeAnimation(username) {
                const welcomeAnimation = document.getElementById('welcome-animation');
                const welcomeText = document.getElementById('welcome-text');
                
                welcomeText.textContent = '欢迎你——' + username;
                
                welcomeAnimation.style.display = 'flex';
                
                setTimeout(() => {
                    welcomeAnimation.classList.add('show');
                }, 100);
                
                setTimeout(() => {
                    welcomeAnimation.classList.add('fade-out');
                }, 3000);
                
                setTimeout(() => {
                    welcomeAnimation.style.display = 'none';
                    welcomeAnimation.classList.remove('show', 'fade-out');
                }, 5000);
                
                const sideDecorations = document.querySelectorAll('.side-decoration');
                sideDecorations.forEach(decoration => {
                    decoration.classList.add('zhenxinhua-style');
                });
                
                if ('speechSynthesis' in window) {
                    const utterance = new SpeechSynthesisUtterance('欢迎你' + username + '，祝你天天开心，万事如意，心想事成，前程似锦！');
                    utterance.lang = 'zh-CN';
                    utterance.rate = 1;
                    utterance.pitch = 1;
                    utterance.volume = 3;
                    window.speechSynthesis.speak(utterance);
                }
            }
            
            function updateLoginState() {
                if (isLoggedIn && currentUsername) {
                    loginBtn.textContent = '退出登录';
                    usernameText.textContent = currentUsername;
                    usernameBackground.style.display = 'flex';
                    
                    if (welcomeMessage) {
                        if (currentUsername === '真心话') {
                            welcomeMessage.textContent = '你好' + currentUsername + '（书记抖音粉丝）';
                        } else {
                            welcomeMessage.textContent = '你好' + currentUsername;
                        }
                    }
                    
                    const sideDecorations = document.querySelectorAll('.side-decoration');
                    sideDecorations.forEach(decoration => {
                        decoration.classList.add('show');
                    });
                    
                    loadFavorites();
                } else {
                    loginBtn.textContent = '登录';
                    usernameBackground.style.display = 'none';
                    
                    if (welcomeMessage) {
                        welcomeMessage.textContent = '';
                    }
                    
                    const sideDecorations = document.querySelectorAll('.side-decoration');
                    sideDecorations.forEach(decoration => {
                        decoration.classList.remove('show');
                    });
                }
            }
            
            function showLoginModal() {
                loginModal.style.display = 'flex';
            }
            
            function handleLogout() {
                if (confirm('确定要退出登录吗？')) {
                    alert('已退出登录');
                    isLoggedIn = false;
                    currentUsername = '';
                    localStorage.setItem('isLoggedIn', 'false');
                    localStorage.setItem('currentUsername', '');
                    updateLoginState();
                }
            }
            
            function getFavorites() {
                const favorites = localStorage.getItem('favorites');
                return favorites ? JSON.parse(favorites) : [];
            }
            
            function saveFavorites(favorites) {
                localStorage.setItem('favorites', JSON.stringify(favorites));
            }
            
            function loadFavorites() {
                const favorites = getFavorites();
                const favoriteBtns = document.querySelectorAll('.favorite-btn');
                
                favoriteBtns.forEach(btn => {
                    const websiteId = btn.getAttribute('data-id');
                    if (favorites.includes(websiteId)) {
                        btn.textContent = '★';
                        btn.classList.add('active');
                    } else {
                        btn.textContent = '☆';
                        btn.classList.remove('active');
                    }
                });
            }
            
            function toggleFavorite(websiteId) {
                if (!isLoggedIn) {
                    alert('请先登录');
                    return;
                }
                
                let favorites = getFavorites();
                const index = favorites.indexOf(websiteId);
                
                if (index > -1) {
                    favorites.splice(index, 1);
                } else {
                    favorites.push(websiteId);
                }
                
                saveFavorites(favorites);
                loadFavorites();
            }
            
            function updateCurrentDate() {
                const now = new Date();
                const year = now.getFullYear();
                const month = now.getMonth() + 1;
                const day = now.getDate();
                const currentDate = document.getElementById('current-date');
                if (currentDate) {
                    currentDate.textContent = `${year}年${month}月${day}日`;
                }
            }
            
            renderWebsites(websites);
            updateLoginState();
            updateCurrentDate();
            
            loginBtn.addEventListener('click', function(e) {
                e.preventDefault();
                if (isLoggedIn) {
                    handleLogout();
                } else {
                    showLoginModal();
                }
            });
            
            closeModalBtn.addEventListener('click', function() {
                loginModal.style.display = 'none';
            });
            
            loginModal.addEventListener('click', function(e) {
                if (e.target === loginModal) {
                    loginModal.style.display = 'none';
                }
            });
            
            loginForm.addEventListener('submit', function(e) {
                e.preventDefault();
                const username = document.getElementById('username').value;
                const password = document.getElementById('password').value;
                
                if (!username) {
                    alert('请选择用户名');
                    return;
                }
                
                if (!password) {
                    alert('请输入密码');
                    return;
                }
                
                if (userPasswords[username] === password) {
                        loginModal.style.display = 'none';
                        this.reset();
                        
                        isLoggedIn = true;
                        currentUsername = username;
                        localStorage.setItem('isLoggedIn', 'true');
                        localStorage.setItem('currentUsername', username);
                        loginBtn.textContent = '退出登录';
                        
                        showWelcomeAnimation(username);
                        
                        if ('speechSynthesis' in window) {
                            const utterance = new SpeechSynthesisUtterance('欢迎你' + username + '，祝你天天开心，万事如意，心想事成，前程似锦！');
                            utterance.lang = 'zh-CN';
                            utterance.rate = 1;
                            utterance.pitch = 1;
                            utterance.volume = 3;
                            window.speechSynthesis.speak(utterance);
                        }
                        
                        usernameText.textContent = username;
                        usernameBackground.style.display = 'flex';
                        
                        if (welcomeMessage) {
                            if (username === '张三') {
                                welcomeMessage.textContent = '你好' + username + '（示例用户）';
                            } else {
                                welcomeMessage.textContent = '你好' + username;
                            }
                        }
                        
                        const sideDecorations = document.querySelectorAll('.side-decoration');
                        sideDecorations.forEach(decoration => {
                            decoration.classList.add('show');
                        });
                        
                        loadFavorites();
                    } else {
                    errorMessage.classList.add('show');
                    document.getElementById('password').value = '';
                    document.getElementById('password').focus();
                }
            });
            
            errorMessage.addEventListener('click', function() {
                errorMessage.classList.remove('show');
            });
            
            websiteSearchInput.addEventListener('input', function() {
                const searchTerm = this.value.toLowerCase();
                const showFavoritesOnly = showFavoritesBtn.classList.contains('active');
                filterWebsites(searchTerm, showFavoritesOnly);
            });
            
            websiteSearchBtn.addEventListener('click', function() {
                const searchTerm = websiteSearchInput.value.toLowerCase();
                const showFavoritesOnly = showFavoritesBtn.classList.contains('active');
                filterWebsites(searchTerm, showFavoritesOnly);
            });
            
            showAllBtn.addEventListener('click', function() {
                showAllBtn.classList.add('active');
                showFavoritesBtn.classList.remove('active');
                const searchTerm = websiteSearchInput.value.toLowerCase();
                filterWebsites(searchTerm, false);
            });
            
            showFavoritesBtn.addEventListener('click', function() {
                showFavoritesBtn.classList.add('active');
                showAllBtn.classList.remove('active');
                const searchTerm = websiteSearchInput.value.toLowerCase();
                filterWebsites(searchTerm, true);
            });
            
            document.querySelectorAll('.favorite-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const websiteId = this.getAttribute('data-id');
                    toggleFavorite(websiteId);
                });
            });
            
            setInterval(updateCurrentDate, 1000);
        });
    </script>
    
    <!-- 真心话登录欢迎动画 -->
    <div class="welcome-animation" id="welcome-animation">
        <div class="welcome-text" id="welcome-text">欢迎你——真心话</div>
    </div>
</body>
</html>
